<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Walmart Storefront Architecture</title>
  <desc id="desc">Colored rectangle diagram of the Walmart storefront flow from routes through controllers, models, scripts, templates, and client assets.</desc>
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #334155; }
      .section { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 15px Arial, sans-serif; fill: #1e293b; }
      .small { font: 500 14px Arial, sans-serif; fill: #475569; }
      .legend { font: 600 14px Arial, sans-serif; fill: #0f172a; }
      .arrow { stroke: #0f172a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .double { stroke: #7c3aed; stroke-width: 4; fill: none; marker-start: url(#arrowPurple); marker-end: url(#arrowPurple); }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#0f172a"/>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1400" height="920" rx="28" fill="#f8fafc"/>
  <text x="42" y="60" class="title">Walmart Storefront Architecture</text>
  <text x="42" y="92" class="subtitle">Canonical storefront flow follows the SFRA-style chain: controller → model → helper/scripts → template → client JS/CSS.</text>

  <rect x="42" y="118" width="1316" height="78" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="64" y="140" width="24" height="24" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="100" y="158" class="legend">Route / controller scope</text>
  <rect x="360" y="140" width="24" height="24" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="396" y="158" class="legend">Model / script scope</text>
  <rect x="696" y="140" width="24" height="24" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="732" y="158" class="legend">Template / UI scope</text>
  <rect x="1026" y="140" width="24" height="24" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="1062" y="158" class="legend">Catalog / shared data scope</text>

  <rect x="60" y="230" width="240" height="600" rx="28" fill="#faf5ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="92" y="274" class="section">1. Routes</text>
  <rect x="90" y="314" width="180" height="160" rx="16" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="114" y="348" class="label">storefrontRoutes.js</text>
  <text x="114" y="376" class="body">/walmart</text>
  <text x="114" y="404" class="body">/product/:id</text>
  <text x="114" y="432" class="body">/cart • /account</text>

  <rect x="90" y="500" width="180" height="298" rx="16" fill="#ffffff" stroke="#c084fc" stroke-width="2"/>
  <text x="114" y="534" class="label">Storefront controllers</text>
  <text x="114" y="562" class="body">Home.js</text>
  <text x="114" y="590" class="body">Product.js</text>
  <text x="114" y="618" class="body">Cart.js</text>
  <text x="114" y="646" class="body">Account.js</text>
  <text x="114" y="686" class="small">Select data and hand it to the view layer</text>

  <rect x="350" y="230" width="300" height="600" rx="28" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <text x="382" y="274" class="section">2. Models + scripts</text>
  <rect x="382" y="314" width="236" height="146" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="406" y="348" class="label">cartridge/models/</text>
  <text x="406" y="376" class="body">homePage.js</text>
  <text x="406" y="404" class="body">productPage.js • cartPage.js</text>
  <text x="406" y="432" class="body">product/productDetail.js</text>

  <rect x="382" y="484" width="236" height="212" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="406" y="518" class="label">cartridge/scripts/helpers/</text>
  <text x="406" y="546" class="body">catalogHelpers.js</text>
  <text x="406" y="574" class="body">homePageHelpers.js</text>
  <text x="406" y="602" class="body">productHelpers.js</text>
  <text x="406" y="638" class="small">Formats prices, cards, sections, and view data</text>

  <rect x="700" y="230" width="340" height="600" rx="28" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="732" y="274" class="section">3. Render layer</text>
  <rect x="732" y="314" width="276" height="184" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="756" y="348" class="label">templates/default/</text>
  <text x="756" y="376" class="body">home/homePage.html</text>
  <text x="756" y="404" class="body">product/productPage.html</text>
  <text x="756" y="432" class="body">cart/cartPage.html</text>
  <text x="756" y="460" class="body">account/accountPage.html</text>

  <rect x="732" y="522" width="276" height="276" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="756" y="556" class="label">client assets</text>
  <text x="756" y="584" class="body">js/homePage.js • productPage.js • cartPage.js</text>
  <text x="756" y="612" class="body">scss/homePage.scss • productPage.scss • cartPage.scss</text>
  <text x="756" y="640" class="body">default/images/products/*.svg</text>
  <text x="756" y="676" class="small">Hydration, interactions, visual styling</text>

  <rect x="1090" y="230" width="250" height="600" rx="28" fill="#fffbeb" stroke="#d97706" stroke-width="3"/>
  <text x="1122" y="274" class="section">4. Data source</text>
  <rect x="1122" y="314" width="186" height="150" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1146" y="348" class="label">Shared commerce data</text>
  <text x="1146" y="376" class="body">Products</text>
  <text x="1146" y="404" class="body">Categories</text>
  <text x="1146" y="432" class="body">Orders / cart context</text>

  <rect x="1122" y="490" width="186" height="242" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="1146" y="524" class="label">Why it matters</text>
  <text x="1146" y="552" class="body">Admin changes appear on next shopper request</text>
  <text x="1146" y="604" class="body">Templates render the latest catalog state</text>
  <text x="1146" y="656" class="body">Client JS enhances, not replaces, server output</text>

  <path class="arrow" d="M300 394H350"/>
  <path class="arrow" d="M650 530H700"/>
  <path class="arrow" d="M1040 520H1090"/>
  <path class="double" d="M1200 230V180H180V230"/>
  <text x="400" y="170" class="small">Shared data and shopper routes continuously influence page composition</text>

  <rect x="60" y="850" width="1280" height="44" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="88" y="878" class="small">Key SFRA pattern: rectangles show layered concerns; solid arrows show request progression; the double arrow shows the ongoing feedback loop with shared catalog state.</text>
</svg>
