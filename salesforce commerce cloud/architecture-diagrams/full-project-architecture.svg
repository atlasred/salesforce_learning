<svg width="1480" height="980" viewBox="0 0 1480 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Full Project Architecture</title>
  <desc id="desc">End-to-end architecture diagram showing admin console, integration server, Walmart storefront, and shared project data together.</desc>
  <defs>
    <style>
      .title { font: 700 36px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #334155; }
      .section { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 15px Arial, sans-serif; fill: #1e293b; }
      .small { font: 500 14px Arial, sans-serif; fill: #475569; }
      .legend { font: 600 14px Arial, sans-serif; fill: #0f172a; }
      .arrow { stroke: #0f172a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .double { stroke: #7c3aed; stroke-width: 4; fill: none; marker-start: url(#arrowPurple); marker-end: url(#arrowPurple); }
      .sync { stroke: #dc2626; stroke-width: 4; fill: none; marker-start: url(#arrowRed); marker-end: url(#arrowRed); }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#0f172a"/>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1480" height="980" rx="30" fill="#f8fafc"/>
  <text x="44" y="64" class="title">Full Project Architecture</text>
  <text x="44" y="98" class="subtitle">One local commerce simulation: admin tools manage shared data, the integration server exposes routes and APIs, and Walmart storefront pages render shopper output.</text>

  <rect x="44" y="124" width="1392" height="82" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="68" y="148" width="24" height="24" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="104" y="166" class="legend">Admin / internal UI</text>
  <rect x="346" y="148" width="24" height="24" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="382" y="166" class="legend">Server / service layer</text>
  <rect x="676" y="148" width="24" height="24" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="712" y="166" class="legend">Shared data layer</text>
  <rect x="982" y="148" width="24" height="24" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1018" y="166" class="legend">Bidirectional route / response path</text>
  <rect x="1292" y="148" width="24" height="24" rx="6" fill="#e0f2fe" stroke="#0891b2"/>
  <text x="1328" y="166" class="legend">Shopper-facing UI</text>

  <rect x="56" y="250" width="300" height="600" rx="30" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="88" y="296" class="section">Admin Console</text>
  <rect x="86" y="334" width="240" height="108" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="370" class="label">admin-console-panel</text>
  <text x="110" y="398" class="body">admin.html • admin.js • admin.css</text>

  <rect x="86" y="468" width="240" height="162" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="110" y="504" class="label">Merchant tasks</text>
  <text x="110" y="532" class="body">Create + edit products</text>
  <text x="110" y="560" class="body">Manage categories</text>
  <text x="110" y="588" class="body">Review orders</text>

  <rect x="86" y="654" width="240" height="164" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="110" y="690" class="label">Standalone admin backend</text>
  <text x="110" y="718" class="body">node-express-backend/src/server.js</text>
  <text x="110" y="746" class="body">Dedicated /api/admin/* routes</text>
  <text x="110" y="774" class="body">Port 4000 option</text>

  <rect x="410" y="250" width="320" height="600" rx="30" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <text x="442" y="296" class="section">Integration Server</text>
  <rect x="440" y="334" width="260" height="112" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="464" y="370" class="label">server/app.js</text>
  <text x="464" y="398" class="body">Express + Nunjucks composition root</text>

  <rect x="440" y="470" width="260" height="178" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="464" y="506" class="label">Routes + controllers</text>
  <text x="464" y="534" class="body">adminRoutes.js</text>
  <text x="464" y="562" class="body">routes/api/*.js</text>
  <text x="464" y="590" class="body">storefrontRoutes.js</text>
  <text x="464" y="618" class="body">controllers/storefront + api</text>

  <rect x="440" y="672" width="260" height="146" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="464" y="708" class="label">Shared services</text>
  <text x="464" y="736" class="body">productService.js</text>
  <text x="464" y="764" class="body">categoryService.js • orderService.js</text>
  <text x="464" y="792" class="body">storefrontCatalogService.js</text>

  <rect x="784" y="250" width="300" height="600" rx="30" fill="#fffbeb" stroke="#d97706" stroke-width="3"/>
  <text x="816" y="296" class="section">Shared Commerce Data</text>
  <rect x="814" y="334" width="240" height="112" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="838" y="370" class="label">admin-console/database/data</text>
  <text x="838" y="398" class="body">products.json • categories.json • orders.json</text>

  <rect x="814" y="470" width="240" height="162" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="838" y="506" class="label">Access paths</text>
  <text x="838" y="534" class="body">Admin backend writes</text>
  <text x="838" y="562" class="body">server/utils/fileStore.js reads</text>
  <text x="838" y="590" class="body">APIs + storefront consume same records</text>

  <rect x="814" y="656" width="240" height="162" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="838" y="692" class="label">Effect</text>
  <text x="838" y="720" class="body">Single source of truth</text>
  <text x="838" y="748" class="body">No duplicate catalog definitions</text>
  <text x="838" y="776" class="body">Fresh data per request</text>

  <rect x="1138" y="250" width="286" height="600" rx="30" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
  <text x="1170" y="296" class="section">Walmart Storefront</text>
  <rect x="1168" y="334" width="226" height="130" rx="16" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="1192" y="370" class="label">walmart/cartridge</text>
  <text x="1192" y="398" class="body">controllers • models • scripts</text>
  <text x="1192" y="426" class="body">templates • client assets</text>

  <rect x="1168" y="490" width="226" height="154" rx="16" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
  <text x="1192" y="526" class="label">Shopper routes</text>
  <text x="1192" y="554" class="body">/walmart</text>
  <text x="1192" y="582" class="body">/product/:id</text>
  <text x="1192" y="610" class="body">/cart • /account</text>

  <rect x="1168" y="668" width="226" height="150" rx="16" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
  <text x="1192" y="704" class="label">Rendered output</text>
  <text x="1192" y="732" class="body">Home, product, cart, and account pages</text>
  <text x="1192" y="760" class="body">Enhanced by JS/CSS from /client</text>

  <path class="double" d="M356 548H410"/>
  <text x="362" y="532" class="small">admin requests</text>

  <path class="arrow" d="M730 548H784"/>
  <text x="736" y="532" class="small">read / write</text>

  <path class="double" d="M1084 548H1138"/>
  <text x="1090" y="532" class="small">route + render</text>

  <path class="sync" d="M930 850V912H206V850"/>
  <text x="382" y="946" class="small">Data feedback loop: merchant updates in the admin console appear in integration APIs and the storefront on subsequent requests.</text>
</svg>
