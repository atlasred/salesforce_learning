<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Integration Server Architecture</title>
  <desc id="desc">Colored rectangle diagram of the local integration server routing admin pages, APIs, and Walmart storefront templates.</desc>
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #334155; }
      .section { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 15px Arial, sans-serif; fill: #1e293b; }
      .small { font: 500 14px Arial, sans-serif; fill: #475569; }
      .legend { font: 600 14px Arial, sans-serif; fill: #0f172a; }
      .arrow { stroke: #0f172a; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .double { stroke: #7c3aed; stroke-width: 4; fill: none; marker-start: url(#arrowPurple); marker-end: url(#arrowPurple); }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#0f172a"/>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1400" height="900" rx="28" fill="#f8fafc"/>
  <text x="42" y="60" class="title">Integration Server Architecture</text>
  <text x="42" y="92" class="subtitle">The Express server in server/ acts as the composition layer for admin pages, shared APIs, and Walmart storefront rendering.</text>

  <rect x="42" y="118" width="1316" height="78" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="64" y="140" width="24" height="24" rx="6" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="100" y="158" class="legend">Entry / route scope</text>
  <rect x="320" y="140" width="24" height="24" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="356" y="158" class="legend">Controller / service scope</text>
  <rect x="660" y="140" width="24" height="24" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="696" y="158" class="legend">Shared data / utility scope</text>
  <rect x="990" y="140" width="24" height="24" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="1026" y="158" class="legend">Rendered output scope</text>

  <rect x="60" y="236" width="280" height="560" rx="28" fill="#faf5ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="92" y="280" class="section">1. Entry</text>
  <rect x="90" y="314" width="220" height="92" rx="16" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="114" y="348" class="label">server/app.js</text>
  <text x="114" y="376" class="body">Express + Nunjucks boot</text>

  <rect x="90" y="430" width="220" height="156" rx="16" fill="#ffffff" stroke="#c084fc" stroke-width="2"/>
  <text x="114" y="464" class="label">Mounted route groups</text>
  <text x="114" y="492" class="body">adminRoutes.js</text>
  <text x="114" y="520" class="body">routes/api/*.js</text>
  <text x="114" y="548" class="body">storefrontRoutes.js</text>

  <rect x="90" y="610" width="220" height="150" rx="16" fill="#ffffff" stroke="#c084fc" stroke-width="2"/>
  <text x="114" y="644" class="label">Static asset mounts</text>
  <text x="114" y="672" class="body">/admin → admin-console-panel</text>
  <text x="114" y="700" class="body">/client → walmart/cartridge/client</text>
  <text x="114" y="728" class="body">/storefront/css → legacy assets</text>

  <rect x="390" y="236" width="380" height="560" rx="28" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <text x="422" y="280" class="section">2. Request handling</text>
  <rect x="422" y="314" width="316" height="110" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="446" y="348" class="label">Storefront controllers</text>
  <text x="446" y="376" class="body">Home.js • Product.js • Cart.js • Account.js</text>
  <text x="446" y="402" class="small">Transform commerce data into page models</text>

  <rect x="422" y="446" width="316" height="110" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="446" y="480" class="label">API controllers</text>
  <text x="446" y="508" class="body">productApiController.js</text>
  <text x="446" y="534" class="body">categoryApiController.js • orderApiController.js</text>

  <rect x="422" y="578" width="316" height="182" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="446" y="612" class="label">Services</text>
  <text x="446" y="640" class="body">productService.js • categoryService.js</text>
  <text x="446" y="668" class="body">orderService.js • storefrontCatalogService.js</text>
  <text x="446" y="696" class="small">Business rules, shaping, grouping, filtering</text>
  <text x="446" y="722" class="small">Used by both JSON APIs and template controllers</text>

  <rect x="820" y="236" width="250" height="560" rx="28" fill="#fffbeb" stroke="#d97706" stroke-width="3"/>
  <text x="852" y="280" class="section">3. Shared data</text>
  <rect x="850" y="320" width="190" height="120" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="874" y="354" class="label">utils/fileStore.js</text>
  <text x="874" y="382" class="body">Reads admin-console</text>
  <text x="874" y="408" class="body">database/data/*.json</text>

  <rect x="850" y="468" width="190" height="136" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="874" y="502" class="label">Single source of truth</text>
  <text x="874" y="530" class="body">Products</text>
  <text x="874" y="556" class="body">Categories</text>
  <text x="874" y="582" class="body">Orders</text>

  <rect x="850" y="632" width="190" height="128" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="874" y="666" class="label">Read pattern</text>
  <text x="874" y="694" class="body">Services fetch data</text>
  <text x="874" y="720" class="body">Controllers map output</text>

  <rect x="1120" y="236" width="230" height="560" rx="28" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="1152" y="280" class="section">4. Outputs</text>
  <rect x="1150" y="320" width="170" height="120" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="1174" y="354" class="label">Admin HTML</text>
  <text x="1174" y="382" class="body">/admin route</text>
  <text x="1174" y="408" class="body">Panel assets</text>

  <rect x="1150" y="468" width="170" height="120" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="1174" y="502" class="label">JSON APIs</text>
  <text x="1174" y="530" class="body">/api/products</text>
  <text x="1174" y="556" class="body">/api/categories</text>

  <rect x="1150" y="616" width="170" height="144" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="1174" y="650" class="label">Walmart pages</text>
  <text x="1174" y="678" class="body">/walmart</text>
  <text x="1174" y="704" class="body">/product/:id</text>
  <text x="1174" y="730" class="body">/cart</text>

  <path class="arrow" d="M340 360H390"/>
  <path class="arrow" d="M340 508H390"/>
  <path class="arrow" d="M770 520H820"/>
  <path class="arrow" d="M1070 520H1120"/>
  <path class="double" d="M945 796V846H580V796"/>
  <text x="584" y="872" class="small">Services can feed both API responses and server-rendered storefront views</text>
</svg>
