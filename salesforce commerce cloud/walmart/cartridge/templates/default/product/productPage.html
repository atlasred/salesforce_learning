<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Page</title>
</head>
<body>
  <header>
    <h1>Product Page</h1>
    <a href="#">Back to Home</a>
  </header>

  <main>
    <section>
      <img src="../../../client/default/images/products/wireless-earbuds.svg" alt="Product image" width="260" height="173" />
      <h2>{{title}}</h2>
      <p>{{price}}</p>
      <p>{{stock}}</p>
      <button type="button">Add to Cart</button>
    </section>

    <section>
      <h3>Description</h3>
      <p>{{description}}</p>
    </section>
  </main>
</body>
</html>
